<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Recruitment System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/profile.css">

</head>
<body class="profile-page">
    <div class="profile-card">
        <div class="avatar">
            <i class="fas fa-user-shield"></i>
        </div>
        <h1>{{ user.username }}</h1>
        <span class="role-badge {{ user.role }}">{{ user.role|upper }}</span>

        <div class="info-row">
            <span class="info-label"><i class="fas fa-envelope"></i> Username</span>
            <span class="info-value">{{ user.username }}</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-user-tag"></i> Role</span>
            <span class="info-value">{{ user.role|capitalize }}</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-calendar-alt"></i> Member since</span>
            <span class="info-value">{{ user.created_at[:10] if user.created_at else 'N/A' }}</span>
        </div>

        <div class="btn-group">
            <a href="/profile/change-password" class="btn-change-pwd"><i class="fas fa-key"></i> Change Password</a>
            <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>
</body>
</html>
