<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Recruitment System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/change_password.css">
    <link rel="stylesheet" href="/static/css/media_queries.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
</head>
<body class="change-pwd-page">
    <div class="pwd-card">
        <h1><i class="fas fa-key"></i> Change Password</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" required autofocus>
            </div>
            <div class="form-group">
                <label>New Password (min 4 characters)</label>
                <input type="password" name="new_password" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" required>
            </div>
            <button type="submit"><i class="fas fa-save"></i> Update Password</button>
        </form>
        <a href="/profile" class="back-link"><i class="fas fa-arrow-left"></i> Back to Profile</a>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    

    <script src="/static/js/change_password.js"></script>
</body>
</html>
